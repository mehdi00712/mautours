<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Mautour Holidays</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<section class="login-page">
  <div class="login-box">
    <h2>Create Account</h2>

    <form id="registerForm">
      <input type="text" id="name" placeholder="Full Name" required />
      <input type="email" id="email" placeholder="Email Address" required />
      <input type="text" id="phone" placeholder="Phone / WhatsApp" required />
      <input type="password" id="password" placeholder="Password" minlength="6" required />

      <button type="submit" class="btn full-width-btn">Register</button>
    </form>

    <p class="login-note">
      Already have an account?
      <a href="login.html">Login</a>
    </p>

    <p id="registerMessage"></p>
  </div>
</section>

<script type="module" src="js/register.js"></script>
</body>
</html>
