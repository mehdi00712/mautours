<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mautours – Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="nav-container">
      <h1 class="logo">Mautours</h1>

      <nav class="nav" id="nav">
        <a href="index.html">Home</a>
        <a href="booking.html">Book</a>
        <a href="login.html" class="active">Login</a>
        <a href="admin.html">Dashboard</a>
      </nav>

      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </header>

  <main class="login-page">
    <div class="login-box">
      <h2>Admin Login</h2>
      <p style="margin-bottom: 1.4rem;">
        Sign in to manage bookings, customers, and travel packages.
      </p>

      <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email address" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit" class="btn">Login</button>
      </form>

      <p id="loginMessage" class="center"></p>
    </div>
  </main>

  <div id="popup" class="popup">
    <div class="popup-content">
      <h3 id="popupTitle"></h3>
      <p id="popupMessage"></p>
      <button id="popupBtn" class="btn">OK</button>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
